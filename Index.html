<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DARK NOVA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
    }
    .neon-green {
      box-shadow: 0 0 15px #22ffaa;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
    }
  </style>
</head>
<body class="min-h-screen text-white pb-20">

  <!-- Header -->
  <div class="flex items-center justify-between p-4 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <i class="fas fa-bars text-2xl"></i>
      <h1 class="text-2xl font-bold tracking-widest">DARK NOVA</h1>
    </div>
    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center">
      👤
    </div>
  </div>

  <!-- Main Content -->
  <div class="p-4 max-w-md mx-auto">

    <!-- Create Account Card -->
    <div class="card rounded-2xl p-6 mb-6">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-xl">
          👤+
        </div>
        <div>
          <h2 class="text-xl font-semibold">Create Account</h2>
          <p class="text-gray-400 text-sm">Add a new user to the system</p>
        </div>
      </div>

      <!-- Form -->
      <div class="space-y-5">
        <div>
          <label class="text-sm text-gray-400 block mb-1">Username</label>
          <div class="flex items-center gap-3 bg-zinc-900 rounded-xl px-4 py-3 border border-red-900/50">
            <i class="fas fa-user text-red-500"></i>
            <input type="text" placeholder="Enter username" 
                   class="bg-transparent flex-1 outline-none text-white placeholder-gray-500">
          </div>
        </div>

        <div>
          <label class="text-sm text-gray-400 block mb-1">Password</label>
          <div class="flex items-center gap-3 bg-zinc-900 rounded-xl px-4 py-3 border border-red-900/50">
            <i class="fas fa-lock text-red-500"></i>
            <input type="password" placeholder="Enter password" 
                   class="bg-transparent flex-1 outline-none text-white placeholder-gray-500">
          </div>
        </div>

        <div>
          <label class="text-sm text-gray-400 block mb-1">Duration</label>
          <div class="flex items-center gap-3 bg-zinc-900 rounded-xl px-4 py-3 border border-red-900/50">
            <i class="fas fa-calendar text-red-500"></i>
            <input type="text" placeholder="Enter duration in days" 
                   class="bg-transparent flex-1 outline-none text-white placeholder-gray-500">
          </div>
        </div>

        <div>
          <label class="text-sm text-gray-400 block mb-1">Role</label>
          <div class="bg-zinc-900 rounded-xl px-4 py-3 border border-red-900/50 flex justify-between items-center">
            <span class="text-white">MEMBER</span>
            <i class="fas fa-chevron-down text-gray-400"></i>
          </div>
        </div>

        <!-- Create Button -->
        <button class="w-full bg-emerald-500 hover:bg-emerald-600 transition-all py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-2 neon-green">
          <i class="fas fa-plus"></i>
          CREATE ACCOUNT
        </button>
      </div>
    </div>

  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-gray-800">
    <div class="flex justify-around py-3 max-w-md mx-auto">
      <div class="flex flex-col items-center text-emerald-500">
        <i class="fas fa-home text-2xl"></i>
        <span class="text-xs mt-1">Home</span>
      </div>
      <div class="flex flex-col items-center text-gray-400">
        <i class="fab fa-whatsapp text-2xl"></i>
        <span class="text-xs mt-1">WhatsApp</span>
      </div>
      <div class="flex flex-col items-center text-gray-400">
        <i class="fas fa-music text-2xl"></i>
        <span class="text-xs mt-1">YouTube Music</span>
      </div>
    </div>
  </div>

</body>
</html>
